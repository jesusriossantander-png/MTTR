name: Actualizar datos desde la planilla

on:
  schedule:
    - cron: '0 9,21 * * *'   # 06:00 y 18:00 hora Argentina (UTC-3)
  workflow_dispatch:          # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Descargar hoja IMPRESION
        run: |
          curl -sL --fail \
            "https://docs.google.com/spreadsheets/d/1uH6TZzYi00e3KIPT4sZUh_1naR8pJGZx46FMEol_jho/gviz/tq?tqx=out:csv&sheet=IMPRESION" \
            -o impresion.csv
          test "$(wc -c < impresion.csv)" -gt 100000  # corta si la descarga vino vacía

      - name: Generar data.js
        run: python tools/parse_mttr.py impresion.csv data.js

      - name: Publicar si hay cambios
        run: |
          rm -f impresion.csv
          if git diff --quiet data.js; then
            echo "Sin cambios en los datos."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.js
            git commit -m "Actualización automática de datos desde la planilla"
            git push
          fi
