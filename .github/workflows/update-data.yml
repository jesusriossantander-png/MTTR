name: Actualizar datos desde la planilla

on:
  schedule:
    - cron: '0 9,21 * * *'   # 06:00 y 18:00 hora Argentina (UTC-3)
  workflow_dispatch:          # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Descargar planilla (privada con service account; pública si no hay secret)
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          pip install --quiet openpyxl google-auth requests
          if [ -n "$SA_JSON" ]; then
            printf '%s' "$SA_JSON" > service-account.json
          fi
          python tools/descargar_planilla.py planilla.xlsx
          rm -f service-account.json
          test "$(wc -c < planilla.xlsx)" -gt 50000  # corta si la descarga vino vacía (la espejo pesa ~130 KB)

      - name: Generar data.js desde la hoja MTTR
        run: python tools/parse_mttr.py planilla.xlsx data.js

      - name: Publicar si hay cambios
        run: |
          rm -f planilla.xlsx
          if git diff --quiet data.js; then
            echo "Sin cambios en los datos."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.js
            git commit -m "Actualización automática de datos desde la planilla"
            git push
          fi
